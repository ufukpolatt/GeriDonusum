<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minik Toz Makineleri</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<style>
:root{
--main-color:#4caf50;
}
  
body{
transition: background 1.2s cubic-bezier(0.25, 1, 0.5, 1);
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#a8e6cf,#dcedc1,#b3e5fc);
text-align:center;
}

.header{
background:white;
padding:12px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}


.title{font-size:32px;font-weight:bold;color:#2e7d32;}
.subtitle{font-size:16px;color:#555;}

.top-row{
display:flex;
justify-content:center;
gap:15px;
padding:10px;
flex-wrap:wrap;
}

.card{
background:white;
padding:15px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
border:3px solid var(--main-color);
}

.control{width:260px;}
.camera{width:420px;}

button{
background:var(--main-color);
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
margin:5px;
transition: all 0.5s ease;
}

canvas{
border-radius:12px;
border:3px solid #4caf50;
max-width:100%;
}

#result{
font-size:22px;
font-weight:bold;
margin:10px;
color:#2e7d32;
}

.recycle-grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:12px;
padding:10px;
max-width:1300px;
margin:auto;
}

.bin{
background:white;
border-radius:20px;
padding:10px;
transition:.3s;
box-shadow:0 4px 12px rgba(0,0,0,.1);
}

.bin img{
width:70px;
height:70px;
object-fit:contain;
}


.active-bin{
transform:scale(1.08);
box-shadow:0 0 25px rgba(0,0,0,.4);
}

.green{border:4px solid #4caf50;}
.yellow{border:4px solid #ffc107;}
.red{border:4px solid #f44336;}
.blue{border:4px solid #2196f3;}
.purple{border:4px solid #9C27B0;}


@media(max-width:900px){
.recycle-grid{
grid-template-columns:repeat(2,1fr);
}
}
</style>
</head>

<body>

<div class="header">
<div class="title">🌿 Minik Toz Makineleri</div>
<div class="subtitle">♻️ Yapay Zekâ Destekli Akıllı Geri Dönüşüm Sistemi</div>
</div>

<div class="top-row">

<div class="card control">
<h3>Kontrol Paneli</h3>
<button onclick="connectArduino()">🔌 Arduino Bağlan</button>
<button onclick="init()">📷 Kamerayı Başlat</button>
<div id="arduinoStatus">Arduino Bağlı Değil</div>
</div>

<div class="card camera">
<h3>Kamera</h3>
<div id="webcam-container"></div>
</div>

</div>

<div id="result">Bekleniyor...</div>

<div class="recycle-grid">

<div class="bin green" id="camBin">
<img src="https://cdn-icons-png.flaticon.com/512/679/679720.png">
<h3>CAM</h3>
</div>

<div class="bin yellow" id="kagitBin">
<img src="https://cdn-icons-png.flaticon.com/512/1046/1046857.png">
<h3>KAĞIT</h3>
</div>

<div class="bin red" id="plastikBin">
<img src="https://cdn-icons-png.flaticon.com/512/2933/2933820.png">
<h3>PLASTİK</h3>
</div>

<div class="bin blue" id="metalBin">
<img src="https://cdn-icons-png.flaticon.com/512/3659/3659899.png">
<h3>METAL</h3>
</div>
  
<div class="bin purple" id="pilBin">
<img src="https://cdn-icons-png.flaticon.com/512/3103/3103446.png">
<h3>PİL</h3>
</div>

</div>

<script>
const URL="https://teachablemachine.withgoogle.com/models/3cT1zuTgp/";

let model,webcam;
let port,writer;
let sonSinif="";

async function connectArduino(){
try{
port=await navigator.serial.requestPort();
await port.open({baudRate:9600});
writer=port.writable.getWriter();
document.getElementById("arduinoStatus").innerText="✅ Arduino Bağlandı";
}catch(e){
alert("Arduino bağlantı hatası");
}
}

function clearBins(){
document.querySelectorAll(".bin").forEach(x=>x.classList.remove("active-bin"));
}

async function init(){

model=await tmImage.load(URL+"model.json",URL+"metadata.json");

webcam=new tmImage.Webcam(320,320,false);

try{
await webcam.setup({facingMode:"environment"});
}catch(e){
await webcam.setup();
}

await webcam.play();

const area=document.getElementById("webcam-container");
area.innerHTML="";
area.appendChild(webcam.canvas);

loop();
}

async function loop(){
webcam.update();
await predict();
requestAnimationFrame(loop);
}

async function changeBackground(color){
document.body.style.background = color;
}

async function predict(){

const prediction=await model.predict(webcam.canvas);

let highest=prediction[0];

for(let i=1;i<prediction.length;i++){
if(prediction[i].probability>highest.probability){
highest=prediction[i];
}
}

let cls=highest.className.toLowerCase();

clearBins();

if(cls==="cam"){
document.getElementById("camBin").classList.add("active-bin");
document.getElementById("result").innerText="🟢 CAM - Bu atığı CAM kutusuna atınız";
setTheme(
"linear-gradient(135deg,#c8e6c9,#a5d6a7,#81c784)",
"#2e7d32"
);
sendArduino("C");
}
else if(cls==="kağıt" || cls==="kagit"){
document.getElementById("kagitBin").classList.add("active-bin");
document.getElementById("result").innerText="🟡 KAĞIT - Bu atığı KAĞIT kutusuna atınız";
changeBackground("linear-gradient(135deg,#fff9c4,#fff59d,#ffe082)");
sendArduino("K");
}
else if(cls==="plastik"){
document.getElementById("plastikBin").classList.add("active-bin");
document.getElementById("result").innerText="🔴 PLASTİK - Bu atığı PLASTİK kutusuna atınız";
setTheme(
"linear-gradient(135deg,#fff9c4,#fff59d,#ffe082)",
"#f9a825"
);
sendArduino("P");
}
else if(cls==="metal"){
document.getElementById("metalBin").classList.add("active-bin");
document.getElementById("result").innerText="🔵 METAL - Bu atığı METAL kutusuna atınız";
setTheme(
"linear-gradient(135deg,#bbdefb,#90caf9,#64b5f6)",
"#1565c0"
);
sendArduino("M");
}
else if(cls==="pil"){
document.getElementById("pilBin").classList.add("active-bin");
document.getElementById("result").innerText="🟣 PİL - Bu atığı PİL kutusuna atınız";
setTheme(
"linear-gradient(135deg,#e1bee7,#ce93d8,#ba68c8)",
"#6a1b9a"
);
sendArduino("R");

}
}

async function sendArduino(harf){

if(!writer) return;

if(sonSinif===harf) return;

sonSinif=harf;

await writer.write(new TextEncoder().encode(harf));
}


</script>

</body>
</html>
